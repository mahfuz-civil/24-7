<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>অ্যাডমিন ম্যানেজমেন্ট প্যানেল</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #4f46e5; --success: #10b981; --warning: #f59e0b; --danger: #ef4444; --dark: #1f2937; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: #f3f4f6; color: var(--dark); }
        
        .admin-header { background: var(--dark); color: white; padding: 1.5rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .admin-container { max-width: 1400px; margin: 2rem auto; padding: 0 1rem; display: grid; grid-template-columns: 1fr 3fr; gap: 2rem; }
        
        @media (max-width: 992px) { .admin-container { grid-template-columns: 1fr; } }

        .card { background: white; padding: 1.5rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 1.5rem; }
        .card-title { font-size: 1.2rem; font-weight: bold; margin-top: 0; border-bottom: 2px solid #f3f4f6; padding-bottom: 0.5rem; display: flex; align-items: center; gap: 0.5rem; }
        
        /* Forms */
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.4rem; font-weight: 600; font-size: 0.9rem; }
        .form-control { width: 100%; padding: 0.6rem; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        
        .btn { padding: 0.6rem 1rem; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; display: inline-flex; align-items: center; gap: 0.3rem; text-decoration: none; font-size: 0.85rem; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-warning { background: var(--warning); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-pathao { background: #e12026; color: white; } /* Pathao Brand Color */

        /* Search input decoration */
        .search-box { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
        .search-box .form-control { font-size: 1rem; }

        /* Status Badges */
        .badge { padding: 0.25rem 0.6rem; border-radius: 20px; font-size: 0.8rem; font-weight: bold; text-transform: uppercase; }
        .badge-pending { background: #feebc8; color: #c05621; }
        .badge-approved { background: #c6f6d5; color: #22543d; }
        .badge-cancelled { background: #fed7d7; color: #9b2c2c; }
        .badge-delivered { background: #e2e8f0; color: #4a5568; }

        /* Tables */
        table { width: 100%; border-collapse: collapse; text-align: left; background: white; }
        th, td { padding: 1rem; border-bottom: 1px solid #e5e7eb; font-size: 0.9rem; }
        th { background: #f8fafc; }

        /* Print Area Selection */
        @media print {
            body * { visibility: hidden; }
            #printSection, #printSection * { visibility: visible; }
            #printSection { position: absolute; left: 0; top: 0; width: 100%; }
            .action-col, .no-print { display: none !important; }
        }
    </style>
</head>
<body>

    <div class="admin-header">
        <h2><i class="fa-solid fa-gears"></i> কন্ট্রোল প্যানেল (Dashboard)</h2>
        <a href="index.html" class="btn" style="background:#555; color:white;"><i class="fa-solid fa-store"></i> মূল ওয়েবসাইট</a>
    </div>

    <div class="admin-container">
        <!-- বাম পাশের প্যানেল: অ্যাড এবং সেটিংস -->
        <div>
            <div class="card">
                <div class="card-title"><i class="fa-solid fa-rectangle-ad"></i> লাইভ অ্যাড তৈরি করুন</div>
                <div class="form-group">
                    <label>আইকন সিলেক্ট করুন</label>
                    <select id="adIcon" class="form-control">
                        <option value="fa-solid fa-fire">🔥 ধামাকা (Fire)</option>
                        <option value="fa-solid fa-gift">🎁 উপহার (Gift)</option>
                        <option value="fa-solid fa-percentage">🏷️ অফার (Percentage)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>অ্যাডের শিরোনাম</label>
                    <input type="text" id="adTitle" class="form-control" placeholder="শিরোনাম লিখুন">
                </div>
                <div class="form-group">
                    <label>বিবরণ</label>
                    <textarea id="adDesc" class="form-control" rows="2" placeholder="অ্যাডের বিস্তারিত..."></textarea>
                </div>
                <div class="form-group">
                    <label>ছবির ইউআরএল অথবা ফাইল</label>
                    <input type="file" id="adImgFile" class="form-control" accept="image/*" onchange="previewImage(this)">
                    <input type="hidden" id="adImgBase64">
                </div>
                <button class="btn btn-primary" style="width: 100%;" onclick="saveAd()"><i class="fa-solid fa-bullhorn"></i> অ্যাড পাবলিশ করুন</button>
            </div>
        </div>

        <!-- ডান পাশের প্যানেল: অর্ডার লিস্ট এবং ট্র্যাকিং -->
        <div class="card" id="printSection">
            <div class="card-title" style="justify-content: space-between; display: flex; align-items: center;">
                <span><i class="fa-solid fa-list-check"></i> অর্ডার ও ডেলিভারি ম্যানেজমেন্ট</span>
                <button class="btn btn-primary no-print" onclick="window.print()"><i class="fa-solid fa-print"></i> ইনভয়েস প্রিন্ট করুন</button>
            </div>

            <!-- সার্চ ও রিয়েলটাইম আপডেট আইকন -->
            <div class="search-box no-print">
                <input type="text" id="adminSearch" class="form-control" placeholder="আইডি, নাম বা প্রোডাক্ট দিয়ে সার্চ করুন..." onkeyup="filterOrders()">
                <button class="btn" style="background:#bbb;"><i id="searchStatusIcon" class="fa-solid fa-magnifying-glass"></i></button>
            </div>

            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>আইডি</th>
                            <th>গ্রাহক</th>
                            <th>প্রোডাক্ট</th>
                            <th>মূল্য</th>
                            <th>অর্ডার স্ট্যাটাস</th>
                            <th>পাঠাও ডেলিভারি</th>
                            <th class="action-col">অ্যাকশন</th>
                        </tr>
                    </thead>
                    <tbody id="adminOrderTable">
                        <!-- জাভাস্ক্রিপ্ট এখানে অর্ডার ডাটা যুক্ত করবে -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // ডেমো বা স্টোরেজ থেকে অর্ডার ডাটা নেওয়া
        let orders = JSON.parse(localStorage.getItem('orders')) || [
            { id: "ORD1001", name: "রাকিব হাসান", phone: "01711223344", address: "মিরপুর, ঢাকা", product: "Premium Wireless Headphone", price: 2500, status: "Pending", pathaoStatus: "Not Sent" },
            { id: "ORD1002", name: "সুমি আক্তার", phone: "01911556677", address: "ধনিয়া, ঢাকা", product: "Luxury Leather Wallet", price: 1200, status: "Approved", pathaoStatus: "Sent" }
        ];

        // ছবির ফাইলকে Base64 টেক্সটে রূপান্তর (যাতে ডাটাবেজ ছাড়া ব্রাউজারে সেভ থাকে)
        function previewImage(input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onloadend = function() {
                document.getElementById('adImgBase64').value = reader.result;
            }
            if (file) reader.readAsDataURL(file);
        }

        // লাইভ অ্যাডভারটাইজমেন্ট সেভ করা
        function saveAd() {
            const icon = document.getElementById('adIcon').value;
            const title = document.getElementById('adTitle').value;
            const desc = document.getElementById('adDesc').value;
            const img = document.getElementById('adImgBase64').value;

            if(!title || !desc) { alert("শিরোনাম ও বিবরণ দিন!"); return; }

            const adData = { icon, title, desc, img: img || "https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?w=500" };
            localStorage.setItem('liveAd', JSON.stringify(adData));
            alert("ওয়েবসাইটে অ্যাডটি সফলভাবে লাইভ করা হয়েছে!");
        }

        // টেবিল রেন্ডার করা
        function renderAdminTable(dataToDisplay = orders) {
            const tbody = document.getElementById('adminOrderTable');
            tbody.innerHTML = '';

            dataToDisplay.forEach((order, index) => {
                let badgeClass = 'badge-pending';
                if(order.status === 'Approved') badgeClass = 'badge-approved';
                if(order.status === 'Cancelled') badgeClass = 'badge-cancelled';
                if(order.status === 'Delivered') badgeClass = 'badge-delivered';

                tbody.innerHTML += `
                    <tr>
                        <td><b>#${order.id}</b></td>
                        <td>${order.name}<br><small>${order.phone}<br>${order.address}</small></td>
                        <td>${order.product}</td>
                        <td>৳ ${order.price}</td>
                        <td><span class="badge ${badgeClass}">${order.status}</span></td>
                        <td>
                            <span style="color:${order.pathaoStatus === 'Sent' ? 'green':'gray'}; font-weight:bold;">
                                <i class="fa-solid fa-motorcycle"></i> ${order.pathaoStatus}
                            </span>
                        </td>
                        <td class="action-col">
                            <button class="btn btn-warning" onclick="changeStatus('${order.id}', 'Approved')"><i class="fa-solid fa-thumbs-up"></i> Approve</button>
                            <button class="btn btn-success" onclick="changeStatus('${order.id}', 'Delivered')"><i class="fa-solid fa-truck"></i> Deliver</button>
                            <button class="btn btn-danger" onclick="changeStatus('${order.id}', 'Cancelled')"><i class="fa-solid fa-xmark"></i> Cancel</button>
                            <button class="btn btn-pathao" onclick="sendToPathao('${order.id}')"><i class="fa-solid fa-paper-plane"></i> Pathao</button>
                        </td>
                    </tr>
                `;
            });
            localStorage.setItem('orders', JSON.stringify(orders));
        }

        // স্ট্যাটাস পরিবর্তন
        function changeStatus(id, newStatus) {
            let order = orders.find(o => o.id === id);
            if(order) {
                order.status = newStatus;
                renderAdminTable();
            }
        }

        // পাঠাও এপিআই সিমুলেশন (Pathao Integration Simulation)
        function sendToPathao(id) {
            let order = orders.find(o => o.id === id);
            if(order) {
                order.pathaoStatus = "Sent";
                alert(`অর্ডার #${id} সফলভাবে পাঠাও কুরিয়ার সার্ভিসে পাঠানো হয়েছে এবং ট্র্যাকিং আইডি জেনারেট হয়েছে!`);
                renderAdminTable();
            }
        }

        // সার্চ ও আপডেট আইকন ইফেক্ট
        function filterOrders() {
            const query = document.getElementById('adminSearch').value.toLowerCase();
            const icon = document.getElementById('searchStatusIcon');
            
            if(query.length > 0) {
                icon.className = "fa-solid fa-arrows-rotate fa-spin"; // সার্চ টাইপ করার সময় আইকন ঘুরবে
            } else {
                icon.className = "fa-solid fa-magnifying-glass";
            }

            const filtered = orders.filter(o => 
                o.name.toLowerCase().includes(query) || 
                o.id.toLowerCase().includes(query) || 
                o.product.toLowerCase().includes(query)
            );

            setTimeout(() => {
                renderAdminTable(filtered);
                if(query.length > 0) icon.className = "fa-solid fa-circle-check"; // সার্চ শেষে আইকন পরিবর্তন
            }, 300);
        }

        window.onload = () => renderAdminTable();
    </script>
</body>
</html>
