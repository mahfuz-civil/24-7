<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Order Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .custom-scroll::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f8fafc; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 9999px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased text-xs select-none">

    <div class="flex h-screen overflow-hidden">
        
        <aside class="w-64 bg-slate-900 text-slate-300 flex flex-col justify-between hidden lg:flex shrink-0">
            <div>
                <div class="p-4 border-b border-slate-800 flex items-center gap-3">
                    <div class="relative">
                        <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=80&auto=format&fit=crop&q=60" alt="Admin Avatar" class="w-10 h-10 rounded-full object-cover ring-2 ring-emerald-500">
                        <span class="absolute bottom-0 right-0 w-2.5 h-2.5 bg-emerald-500 rounded-full border-2 border-slate-900"></span>
                    </div>
                    <div>
                        <h4 class="font-bold text-white text-sm leading-tight tracking-wide">Mahfuz</h4>
                        <span class="text-[11px] text-slate-400 font-medium">Admin</span>
                    </div>
                </div>
                
                <nav class="p-3 space-y-1">
                    <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-slate-800 transition font-medium text-slate-400 hover:text-slate-200">
                        <i data-lucide="layout-dashboard" class="w-4 h-4"></i> Dashboard
                    </a>
                    <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-xl bg-emerald-600 text-white font-semibold shadow-md shadow-emerald-900/30">
                        <i data-lucide="shopping-cart" class="w-4 h-4"></i> Orders
                    </a>
                    <a href="#" class="flex items-center justify-between px-3 py-2.5 rounded-xl hover:bg-slate-800 transition font-medium text-slate-400 hover:text-slate-200 group">
                        <span class="flex items-center gap-3"><i data-lucide="package" class="w-4 h-4"></i> Products</span>
                        <i data-lucide="chevron-down" class="w-3.5 h-3.5 text-slate-600 group-hover:text-slate-400"></i>
                    </a>
                    <a href="#" class="flex items-center justify-between px-3 py-2.5 rounded-xl hover:bg-slate-800 transition font-medium text-slate-400 hover:text-slate-200 group">
                        <span class="flex items-center gap-3"><i data-lucide="users" class="w-4 h-4"></i> Customer</span>
                        <i data-lucide="chevron-down" class="w-3.5 h-3.5 text-slate-600 group-hover:text-slate-400"></i>
                    </a>
                </nav>
            </div>
        </aside>

        <main class="flex-1 flex flex-col overflow-y-auto">
            
            <header class="bg-white border-b border-slate-200 h-14 flex items-center justify-between px-6 sticky top-0 z-20 shadow-sm">
                <button class="p-2 hover:bg-slate-100 rounded-lg text-slate-600 transition">
                    <i data-lucide="menu" class="w-4 h-4"></i>
                </button>
                <div class="flex items-center gap-3">
                    <span class="text-slate-400 font-medium">Backend Portal</span>
                    <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=80&auto=format&fit=crop&q=60" alt="Profile avatar" class="w-7 h-7 rounded-full object-cover border border-slate-200 shadow-sm">
                </div>
            </header>

            <div class="p-4 sm:p-6 space-y-4 max-w-[1750px] w-full mx-auto">
                
                <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
                    <h1 class="text-xl font-bold text-slate-900 tracking-tight">Orders Management</h1>
                    <div class="flex items-center gap-2 self-end sm:self-auto">
                        <button class="flex items-center gap-1.5 px-3 py-1.5 border border-slate-300 rounded-lg bg-white font-medium text-slate-700 hover:bg-slate-50 shadow-sm transition">
                            <i data-lucide="filter" class="w-3.5 h-3.5 text-slate-500"></i> Filter
                        </button>
                        <button class="flex items-center gap-1.5 px-3 py-1.5 border border-slate-300 rounded-lg bg-white font-medium text-slate-700 hover:bg-slate-50 shadow-sm transition">
                            Action <i data-lucide="chevron-down" class="w-3.5 h-3.5 text-slate-400"></i>
                        </button>
                        <button class="flex items-center gap-1.5 px-3.5 py-1.5 bg-emerald-600 text-white rounded-lg font-semibold hover:bg-emerald-700 transition shadow-sm">
                            <i data-lucide="plus" class="w-3.5 h-3.5"></i> Create Order
                        </button>
                    </div>
                </div>

                <div class="bg-white p-1.5 rounded-xl border border-slate-200 shadow-sm overflow-x-auto whitespace-nowrap flex gap-1 custom-scroll">
                    <button class="px-3 py-1.5 rounded-lg font-medium hover:bg-slate-100 text-slate-600 flex items-center gap-1.5 transition">All <span class="bg-slate-100 text-slate-600 px-1.5 py-0.5 rounded text-[10px]">1166</span></button>
                    <button class="px-3 py-1.5 rounded-lg font-medium hover:bg-slate-100 text-slate-600 flex items-center gap-1.5 transition">Pre Order <span class="bg-slate-100 text-slate-400 px-1.5 py-0.5 rounded text-[10px]">0</span></button>
                    <button class="px-3 py-1.5 rounded-lg font-medium hover:bg-slate-100 text-slate-600 flex items-center gap-1.5 transition">New <span class="bg-slate-100 text-slate-400 px-1.5 py-0.5 rounded text-[10px]">0</span></button>
                    <button class="px-3 py-1.5 rounded-lg font-medium hover:bg-slate-100 text-slate-600 flex items-center gap-1.5 transition">Pending <span class="bg-slate-100 text-slate-400 px-1.5 py-0.5 rounded text-[10px]">0</span></button>
                    <button class="px-3 py-1.5 rounded-lg font-medium hover:bg-slate-100 text-slate-600 flex items-center gap-1.5 transition">Approved <span class="bg-slate-100 text-slate-400 px-1.5 py-0.5 rounded text-[10px]">0</span></button>
                    <button class="px-3 py-1.5 rounded-lg font-medium text-amber-700 bg-amber-50 flex items-center gap-1.5 border border-amber-200/40">Hold <span class="bg-amber-100 text-amber-800 px-1.5 py-0.5 rounded text-[10px]">3</span></button>
                    <button class="px-3 py-1.5 rounded-lg font-medium hover:bg-slate-100 text-slate-600 flex items-center gap-1.5 transition">WFP <span class="bg-slate-100 text-slate-400 px-1.5 py-0.5 rounded text-[10px]">0</span></button>
                    <button class="px-3 py-1.5 rounded-lg font-bold bg-emerald-600 text-white flex items-center gap-1.5 shadow-sm">Packaging <span class="bg-emerald-700 text-emerald-100 px-1.5 py-0.5 rounded text-[10px]">36</span></button>
                    <button class="px-3 py-1.5 rounded-lg font-medium hover:bg-slate-100 text-slate-600 flex items-center gap-1.5 transition">Shipment <span class="bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded text-[10px]">25</span></button>
                    <button class="px-3 py-1.5 rounded-lg font-medium hover:bg-slate-100 text-slate-600 flex items-center gap-1.5 transition">Partial Deliverd <span class="bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded text-[10px]">12</span></button>
                    <button class="px-3 py-1.5 rounded-lg font-medium hover:bg-slate-100 text-slate-600 flex items-center gap-1.5 transition">Delivered <span class="bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded text-[10px]">788</span></button>
                    <button class="px-3 py-1.5 rounded-lg font-medium hover:bg-slate-100 text-slate-600 flex items-center gap-1.5 transition">Return <span class="bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded text-[10px]">219</span></button>
                    <button class="px-3 py-1.5 rounded-lg font-medium hover:bg-slate-100 text-slate-600 flex items-center gap-1.5 transition">Return Pending <span class="bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded text-[10px]">17</span></button>
                </div>

                <div class="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden">
                    
                    <div class="p-3 border-b border-slate-200 flex flex-col sm:flex-row justify-between items-center gap-3 bg-slate-50/50">
                        <div class="flex items-center gap-2">
