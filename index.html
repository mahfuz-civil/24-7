<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Order & Admin Management System</title>
    <!-- FontAwesome for beautiful icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #4f46e5;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
            --dark-color: #1f2937;
            --light-color: #f3f4f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f9fafb;
            color: var(--dark-color);
        }

        header {
            background-color: var(--primary-color);
            color: white;
            padding: 1.5rem;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }

        @media (min-width: 768px) {
            .grid {
                grid-template-columns: 1fr 2fr;
            }
        }

        /* Card Styles */
        .card {
            background: white;
            border-radius: 8px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 2rem;
        }

        .card-title {
            font-size: 1.25rem;
            margin-top: 0;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border-bottom: 2px solid var(--light-color);
            padding-bottom: 0.5rem;
        }

        /* Form Controls */
        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .form-control {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            box-sizing: border-box;
        }

        .btn {
            background-color: var(--primary-color);
            color: white;
            padding: 0.75rem 1.2rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .btn-success { background-color: var(--success-color); }
        .btn-warning { background-color: var(--warning-color); }
        .btn-danger { background-color: var(--danger-color); }
        .btn-secondary { background-color: #6b7280; }

        /* Search Bar */
        .search-container {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        /* Status Badges */
        .badge {
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: bold;
            text-transform: uppercase;
        }
        .badge-pending { background-color: #feebc8; color: #c05621; }
        .badge-approved { background-color: #c6f6d5; color: #22543d; }
        .badge-cancelled { background-color: #fed7d7; color: #9b2c2c; }
        .badge-delivered { background-color: #e2e8f0; color: #4a5568; }

        /* Tables */
        .table-responsive {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 1rem;
            border-bottom: 1px solid #e5e7eb;
        }

        th {
            background-color: #f8fafc;
        }

        /* Ads Section */
        .ad-banner {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 1.5rem;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .ad-icon-display {
            font-size: 3rem;
        }

        /* Print Styles */
        @media print {
            body * {
                visibility: hidden;
            }
            #printArea, #printArea * {
                visibility: visible;
            }
            #printArea {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
            }
            .action-buttons, .search-container, .card:not(#admin-panel) {
                display: none !important;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1><i class="fa-solid fa-layer-group"></i> Smart Order & Admin Dashboard</h1>
    </header>

    <div class="container">
        <!-- Dynamic Ad Banner Section -->
        <div class="ad-banner" id="adBanner">
            <div class="ad-icon-display"><i id="displayAdIcon" class="fa-solid fa-rectangle-ad"></i></div>
            <div>
                <h2 style="margin:0;" id="displayAdTitle">Your Promotion Here!</h2>
                <p style="margin:5px 0 0 0;" id="displayAdDesc">Create an advertisement using the panel below to update this area.</p>
            </div>
        </div>

        <div class="grid">
            <!-- Left Column: Controls -->
            <div>
                <!-- Add Advertisement Card -->
                <div class="card">
                    <div class="card-title"><i class="fa-solid fa-bullhorn text-primary"></i> Create Promo Ad</div>
                    <div class="form-group">
                        <label>Select Ad Icon</label>
                        <select id="adIcon" class="form-control">
                            <option value="fa-solid fa-tag">🏷️ Tag / Discount</option>
                            <option value="fa-solid fa-fire">🔥 Hot Deal</option>
                            <option value="fa-solid fa-gift">🎁 Gift Package</option>
                            <option value="fa-solid fa-star">⭐ Star Feature</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Ad Title</label>
                        <input type="text" id="adTitle" class="form-control" placeholder="e.g., Midnight Flash Sale!">
                    </div>
                    <div class="form-group">
                        <label>Ad Description</label>
                        <textarea id="adDesc" class="form-control" rows="2" placeholder="e.g., Get 50% off on all electronic items..."></textarea>
                    </div>
                    <button class="btn" onclick="updateAdvertisement()"><i class="fa-solid fa-bullhorn"></i> Push Live Ad</button>
                </div>

                <!-- New Order Placement Simulation -->
                <div class="card">
                    <div class="card-title"><i class="fa-solid fa-cart-plus"></i> Simulate New Order</div>
                    <div class="form-group">
                        <label>Customer Name</label>
                        <input type="text" id="custName" class="form-control" placeholder="John Doe">
                    </div>
                    <div class="form-group">
                        <label>Product Item</label>
                        <input type="text" id="prodName" class="form-control" placeholder="Wireless Headphones">
                    </div>
                    <div class="form-group">
                        <label>Price ($)</label>
                        <input type="number" id="prodPrice" class="form-control" placeholder="99.99">
                    </div>
                    <button class="btn btn-success" onclick="placeOrder()"><i class="fa-solid fa-check"></i> Place Order</button>
                </div>
            </div>

            <!-- Right Column: Main Administration Panel -->
            <div class="card" id="printArea">
                <div class="card-title" style="justify-content: space-between; display: flex;">
                    <span><i class="fa-solid fa-user-gear"></i> Order Processing Central</span>
                    <button class="btn btn-secondary action-buttons" onclick="window.print()"><i class="fa-solid fa-print"></i> Print Invoice Sheet</button>
                </div>

                <!-- Search Bar with dynamic icon feedback -->
                <div class="search-container action-buttons">
                    <input type="text" id="searchBar" class="form-control" placeholder="Search orders by customer or product..." onkeyup="searchOrders()">
                    <button class="btn" style="background-color: #4b5563;"><i id="searchIcon" class="fa-solid fa-magnifying-glass"></i></button>
                </div>

                <!-- Main Orders Management Table -->
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>Order ID</th>
                                <th>Customer</th>
                                <th>Product</th>
                                <th>Price</th>
                                <th>Status</th>
                                <th class="action-buttons">Management Actions</th>
                            </tr>
                        </thead>
                        <tbody id="orderTableBody">
                            <!-- JS will inject dynamic rows here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Mock Initial Database
        let orders = [
            { id: "ORD1001", customer: "Alice Smith", product: "iPhone 15 Case", price: 29.99, status: "Pending" },
            { id: "ORD1002", customer: "Bob Jones", product: "Mechanical Keyboard", price: 89.50, status: "Approved" },
            { id: "ORD1003", customer: "Charlie Brown", product: "Gaming Mouse", price: 45.00, status: "Delivered" }
        ];

        // Render orders to the table view
        function renderOrders(ordersToDisplay = orders) {
            const tableBody = document.getElementById('orderTableBody');
            tableBody.innerHTML = '';

            if(ordersToDisplay.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="6" style="text-align:center;">No matching records found</td></tr>`;
                return;
            }

            ordersToDisplay.forEach(order => {
                let statusBadge = '';
                switch(order.status.toLowerCase()) {
                    case 'pending': statusBadge = `<span class="badge badge-pending"><i class="fa-solid fa-clock"></i> Pending</span>`; break;
                    case 'approved': statusBadge = `<span class="badge badge-approved"><i class="fa-solid fa-square-check"></i> Approved</span>`; break;
                    case 'cancelled': statusBadge = `<span class="badge badge-danger"><i class="fa-solid fa-ban"></i> Cancelled</span>`; break;
                    case 'delivered': statusBadge = `<span class="badge badge-delivered"><i class="fa-solid fa-truck-ramp-box"></i> Delivered</span>`; break;
                }

                tableBody.innerHTML += `
                    <tr>
                        <td><strong>#${order.id}</strong></td>
                        <td>${order.customer}</td>
                        <td>${order.product}</td>
                        <td>$${order.price.toFixed(2)}</td>
                        <td>${statusBadge}</td>
                        <td class="action-buttons">
                            <button class="btn btn-warning" style="padding: 4px 8px; font-size: 12px;" onclick="updateStatus('${order.id}', 'Approved')"><i class="fa-solid fa-thumbs-up"></i> Approve</button>
                            <button class="btn btn-success" style="padding: 4px 8px; font-size: 12px;" onclick="updateStatus('${order.id}', 'Delivered')"><i class="fa-solid fa-truck"></i> Deliver</button>
                            <button class="btn btn-danger" style="padding: 4px 8px; font-size: 12px;" onclick="updateStatus('${order.id}', 'Cancelled')"><i class="fa-solid fa-xmark"></i> Cancel</button>
                        </td>
                    </tr>
                `;
            });
        }

        // Live status updating processing
        function updateStatus(orderId, newStatus) {
            const orderIndex = orders.findIndex(o => o.id === orderId);
            if (orderIndex !== -1) {
                orders[orderIndex].status = newStatus;
                renderOrders();
            }
        }

        // Place a simulated order
        function placeOrder() {
            const custName = document.getElementById('custName').value.trim();
            const prodName = document.getElementById('prodName').value.trim();
            const prodPrice = parseFloat(document.getElementById('prodPrice').value);

            if(!custName || !prodName || isNaN(prodPrice)) {
                alert("Please fill out all order parameters cleanly!");
                return;
            }

            const newOrder = {
                id: "ORD" + (1000 + orders.length + 1),
                customer: custName,
                product: prodName,
                price: prodPrice,
                status: "Pending"
            };

            orders.push(newOrder);
            renderOrders();

            // Clear Inputs
            document.getElementById('custName').value = '';
            document.getElementById('prodName').value = '';
            document.getElementById('prodPrice').value = '';
        }

        // Live search bar filter with magnifying glass icon transformation feedback
        function searchOrders() {
            const query = document.getElementById('searchBar').value.toLowerCase();
            const searchIcon = document.getElementById('searchIcon');
            
            // Icon transforms visually if user is actively writing queries
            if(query.length > 0) {
                searchIcon.className = "fa-solid fa-spinner fa-spin";
            } else {
                searchIcon.className = "fa-solid fa-magnifying-glass";
            }

            const filtered = orders.filter(order => 
                order.customer.toLowerCase().includes(query) || 
                order.product.toLowerCase().includes(query) ||
                order.id.toLowerCase().includes(query)
            );
            
            setTimeout(() => {
                renderOrders(filtered);
                if(query.length > 0) searchIcon.className = "fa-solid fa-filter";
            }, 200);
        }

        // Update advertisement system module 
        function updateAdvertisement() {
            const selectedIconClass = document.getElementById('adIcon').value;
            const titleText = document.getElementById('adTitle').value.trim();
            const descText = document.getElementById('adDesc').value.trim();

            if(!titleText || !descText) {
                alert("Please provide complete Title and Description parameters for your Ad Banner!");
                return;
            }

            // Target banner components
            document.getElementById('displayAdIcon').className = selectedIconClass;
            document.getElementById('displayAdTitle').innerText = titleText;
            document.getElementById('displayAdDesc').innerText = descText;
        }

        // Initial Layout Initialization
        renderOrders();
    </script>
</body>
</html>
