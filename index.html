<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>24-7 Online Shop & Order Manager</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f5f6fa; color: #333; padding-bottom: 50px; }
        header { background-color: #2c3e50; color: white; padding: 15px; text-align: center; font-size: 24px; font-weight: bold; }
        
        .nav-tabs { display: flex; justify-content: center; background: #34495e; }
        .nav-tabs button { background: none; border: none; color: #bdc3c7; padding: 12px 20px; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .nav-tabs button.active { color: white; background: #2c3e50; font-weight: bold; border-bottom: 3px solid #2ecc71; }
        
        .page { display: none; max-width: 1000px; margin: 30px auto; padding: 0 20px; }
        .page.active { display: block; }

        /* শপ পেজ */
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .product-card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; }
        .product-card img { width: 100%; height: 200px; object-fit: cover; border-radius: 6px; }
        .product-card h3 { margin: 15px 0 5px; color: #2c3e50; }
        .product-card .price { color: #e74c3c; font-size: 20px; font-weight: bold; margin-bottom: 15px; }
        .order-btn { background: #27ae60; color: white; border: none; padding: 10px; width: 100%; border-radius: 5px; cursor: pointer; font-size: 16px; }
        
        /* অর্ডার ফরম পপ-আপ */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background: white; padding: 25px; border-radius: 8px; width: 100%; max-width: 400px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .modal-content h3 { margin-bottom: 15px; color: #2c3e50; }
        .modal-content input, .modal-content textarea { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 4px; }
        .modal-buttons { display: flex; gap: 10px; }
        .submit-btn { background: #27ae60; color: white; border: none; padding: 10px; flex: 1; border-radius: 4px; cursor: pointer; }
        .close-btn { background: #95a5a6; color: white; border: none; padding: 10px; flex: 1; border-radius: 4px; cursor: pointer; }

        /* অ্যাডমিন ড্যাশবোর্ড টেবিল */
        .admin-table-container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; text-align: center; }
        th { background-color: #f1f2f6; color: #2c3e50; }
        
        /* স্ট্যাটাস ব্যাজ */
        .badge { padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; color: white; display: inline-block; }
        .badge.pending { background: #f1c40f; }
        .badge.approved { background: #3498db; }
        .badge.canceled { background: #e74c3c; }
        .badge.delivered { background: #2ecc71; }

        /* অ্যাকশন বাটন */
        .action-btn { padding: 5px 8px; border: none; border-radius: 4px; color: white; cursor: pointer; font-size: 12px; margin: 2px; }
        .btn-approve { background: #3498db; }
        .btn-cancel { background: #e74c3c; }
        .btn-deliver { background: #2ecc71; }
    </style>
</head>
<body>

    <header>24-7 Online Shop</header>

    <div class="nav-tabs">
        <button id="shopTab" class="active" onclick="switchPage('shop-page')">🛍️ শপ পেজ</button>
        <button id="adminTab" onclick="switchPage('admin-page')">⚙️ অ্যাডমিন ড্যাশবোর্ড</button>
    </div>

    <div id="shop-page" class="page active">
        <div class="product-grid">
            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?q=80&w=500" alt="Premium Watch">
                <h3>স্মার্ট ওয়াচ (Premium)</h3>
                <p class="price">৳ ২,৫০০</p>
                <button class="order-btn" onclick="openOrderModal('স্মার্ট ওয়াচ (Premium)', '৳ ২,৫০০')">সরাসরি অর্ডার করুন</button>
            </div>
            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?q=80&w=500" alt="Headphone">
                <h3>ওয়ারলেস হেডফোন</h3>
                <p class="price">৳ ১,৮০০</p>
                <button class="order-btn" onclick="openOrderModal('ওয়ারলেস হেডফোন', '৳ ১,৮০০')">সরাসরি অর্ডার করুন</button>
            </div>
        </div>
    </div>

    <div id="orderModal" class="modal">
        <div class="modal-content">
            <h3 id="modalProductTitle">অর্ডার নিশ্চিত করুন</h3>
            <form id="orderForm" onsubmit="submitOrder(event)">
                <input type="hidden" id="formProductName">
                <input type="hidden" id="formProductPrice">
                
                <label>আপনার নাম:</label>
                <input type="text" id="custName" required placeholder="যেমন: মো: আরিফ">
                
                <label>ফোন নাম্বার:</label>
                <input type="tel" id="custPhone" required placeholder="যেমন: 017XXXXXXXX">
                
                <label>ডেলিভারি লোকেশন/ঠিকানা:</label>
                <textarea id="custLocation" rows="3" required placeholder="যেমন: বাসা নং ৪, রোড ২, মিরপুর, ঢাকা"></textarea>
                
                <div class="modal-buttons">
                    <button type="submit" class="submit-btn">অর্ডার কনফার্ম করুন</button>
                    <button type="button" class="close-btn" onclick="closeOrderModal()">বন্ধ করুন</button>
                </div>
            </form>
        </div>
    </div>

    <div id="admin-page" class="page">
        <h2>সব অর্ডারের তালিকা</h2>
        <p style="color: #7f8c8d; margin-bottom: 15px;">(আপনার ব্রাউজারে অর্ডারগুলো সুরক্ষিত থাকবে)</p>
        
        <div class="admin-table-container">
            <table>
                <thead>
                    <tr>
                        <th>প্রোডাক্ট</th>
                        <th>মূল্য</th>
                        <th>কাস্টমার</th>
                        <th>ফোন নাম্বার</th>
                        <th>লোকেশন</th>
                        <th>স্ট্যাটাস</th>
                        <th>অ্যাকশন (পরিবর্তন করুন)</th>
                    </tr>
                </thead>
                <tbody id="orderTableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        // পেজ পরিবর্তন করার ফাংশন
        function switchPage(pageId) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.querySelectorAll('.nav-tabs button').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(pageId).classList.add('active');
            if(pageId === 'shop-page') document.getElementById('shopTab').classList.add('active');
            if(pageId === 'admin-page') {
                document.getElementById('adminTab').classList.add('active');
                renderAdminTable();
            }
        }

        // অর্ডার পপ-আপ খোলার ফাংশন
        function openOrderModal(pName, pPrice) {
            document.getElementById('orderModal').style.display = 'flex';
            document.getElementById('modalProductTitle').innerText = pName + " - অর্ডার ফরম";
            document.getElementById('formProductName').value = pName;
            document.getElementById('formProductPrice').value = pPrice;
        }

        // পপ-আপ বন্ধ করার ফাংশন
        function closeOrderModal() {
            document.getElementById('orderModal').style.display = 'none';
            document.getElementById('orderForm').reset();
        }

        // অর্ডার সাবমিট ও লোকাল স্টোরেজে সেভ করা
        function submitOrder(e) {
            e.preventDefault();
            
            const newOrder = {
                id: Date.now(),
                product: document.getElementById('formProductName').value,
                price: document.getElementById('formProductPrice').value,
                name: document.getElementById('custName').value,
                phone: document.getElementById('custPhone').value,
                location: document.getElementById('custLocation').value,
                status: 'Pending' // প্রথমাবস্থায় Pending থাকবে
            };

            let orders = JSON.parse(localStorage.getItem('shopOrders')) || [];
            orders.push(newOrder);
            localStorage.setItem('shopOrders', JSON.stringify(orders));

            alert('আপনার অর্ডারটি সফলভাবে গ্রহণ করা হয়েছে!');
            closeOrderModal();
        }

        // অ্যাডমিন টেবিলে ডাটা প্রদর্শন করা
        function renderAdminTable() {
            const tableBody = document.getElementById('orderTableBody');
            tableBody.innerHTML = '';
            let orders = JSON.parse(localStorage.getItem('shopOrders')) || [];

            if(orders.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="7">এখনো কোনো অর্ডার আসেনি।</td></tr>`;
                return;
            }

            orders.reverse().forEach(order => {
                let statusClass = order.status.toLowerCase();
                
                tableBody.innerHTML += `
                    <tr>
                        <td><b>${order.product}</b></td>
                        <td>${order.price}</td>
                        <td>${order.name}</td>
                        <td><a href="tel:${order.phone}">${order.phone}</a></td>
                        <td>${order.location}</td>
                        <td><span class="badge ${statusClass}">${order.status}</span></td>
                        <td>
                            <button class="action-btn btn-approve" onclick="updateStatus(${order.id}, 'Approved')">Approve</button>
                            <button class="action-btn btn-cancel" onclick="updateStatus(${order.id}, 'Canceled')">Cancel</button>
                            <button class="action-btn btn-deliver" onclick="updateStatus(${order.id}, 'Delivered')">Delivered</button>
                        </td>
                    </tr>
                `;
            });
        }

        // অর্ডারের স্ট্যাটাস (Approve, Cancel, Delivered) আপডেট করার ফাংশন
        function updateStatus(orderId, newStatus) {
            let orders = JSON.parse(localStorage.getItem('shopOrders')) || [];
            orders = orders.map(order => {
                if(order.id === orderId) {
                    order.status = newStatus;
                }
                return order;
            });
            localStorage.setItem('shopOrders', JSON.stringify(orders));
            renderAdminTable(); // টেবিল রিফ্রেশ
        }
    </script>
</body>
</html>
